services:
  - type: web
    name: bkash-crm-sorter
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PORT
        value: "8000"
    healthCheckPath: /health
